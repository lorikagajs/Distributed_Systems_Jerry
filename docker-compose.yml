version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jerry_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: jerry
      POSTGRES_PASSWORD: jerry_secret
      POSTGRES_DB: jerry_ecommerce
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jerry_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
